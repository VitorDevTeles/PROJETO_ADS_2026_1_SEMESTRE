{% extends "layout.html" %}

{% block content %}

<div class="container mt-4">
    <div class="row">

        {% for produto in produtos %}
        <div class="col-md-4 mb-4">
            <div class="card h-100 shadow">

                {% if produto.imagem %}
                    <img src="{{ url_for('static', filename='imagens/' + produto.imagem) }}"
                         class="card-img-top"
                         style="height: 220px; object-fit: cover;">
                {% else %}
                    <img src="{{ url_for('static', filename='imagens/sem-imagem.png') }}"
                         class="card-img-top"
                         style="height: 220px; object-fit: cover;">
                {% endif %}

                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">{{ produto.nome }}</h5>
                    <p class="card-text">{{ produto.descricao }}</p>

                    <div class="mt-auto">
                        <p class="fw-bold text-success">R$ {{ "%.2f"|format(produto.preco) }}</p>

                        {% if session.get("admin") %}
                            <a href="/editar/{{ produto.id }}" class="btn btn-warning btn-sm">
                                Editar
                            </a>
                        {% endif %}
                    </div>
                </div>

              <div class="card-footer text-center">

    <input type="text" id="nome{{ produto.id }}" placeholder="Seu nome" class="form-control mb-2" required>
    
    <input type="text" id="endereco{{ produto.id }}" placeholder="Seu endereço" class="form-control mb-2" required>
    
    <textarea id="obs{{ produto.id }}" placeholder="Observações (opcional)" class="form-control mb-2"></textarea>

<button 
    class="btn btn-success w-100"
    data-nome="{{ produto.nome }}"
    data-preco="{{ produto.preco }}"
    data-id="{{ produto.id }}"
    onclick="enviarWhats(this)">
    Finalizar pedido no WhatsApp
</button>

<button 
class="btn btn-primary w-100 mb-2"
onclick="adicionarCarrinho('{{ produto.nome }}', '{{ produto.preco }}')">
Adicionar ao Carrinho
</button>

</div>

            </div>
        </div>
        {% endfor %}

    </div>
</div>

<script>
function enviarWhats(botao) {
    let nomeProduto = botao.getAttribute("data-nome");
    let preco = botao.getAttribute("data-preco");
    let id = botao.getAttribute("data-id");

    let nome = document.getElementById("nome" + id).value;
    let endereco = document.getElementById("endereco" + id).value;
    let obs = document.getElementById("obs" + id).value;

    if (!nome || !endereco) {
        alert("Preencha seu nome e endereço!");
        return;
    }

    let mensagem = 
        "🛒 *NOVO PEDIDO*%0A%0A" +
        "📦 Produto: " + nomeProduto + "%0A" +
        "💰 Preço: R$ " + parseFloat(preco).toFixed(2) + "%0A%0A" +
        "👤 Nome: " + nome + "%0A" +
        "📍 Endereço: " + endereco + "%0A" +
        "📝 Obs: " + obs;

    let url = "https://wa.me/5511959589388?text=" + mensagem;

    window.open(url, "_blank");
}
</script>

<script>
let carrinho = [];

function adicionarCarrinho(nome, preco) {
    carrinho.push({
        nome: nome,
        preco: parseFloat(preco),
        qtd: 1
    });

    alert("Produto adicionado ao carrinho!");
}
</script>

<script>
function enviarCarrinho() {

    if (carrinho.length === 0) {
        alert("Carrinho vazio!");
        return;
    }

    let mensagem = "🛒 *PEDIDO COMPLETO*%0A%0A";
    let total = 0;

    carrinho.forEach(p => {
        mensagem += `📦 ${p.nome} (x${p.qtd}) - R$ ${p.preco.toFixed(2)}%0A`;
        total += p.preco * p.qtd;
    });

    mensagem += `%0A💰 Total: R$ ${total.toFixed(2)}`;

    let url = "https://wa.me/5511959589388?text=" + mensagem;

    window.open(url, "_blank");
}
</script>

<script>
function adicionarCarrinho(nome, preco) {
    let produto = carrinho.find(p => p.nome === nome);

    if (produto) {
        produto.qtd += 1;
    } else {
        carrinho.push({
            nome: nome,
            preco: parseFloat(preco),
            qtd: 1
        });
    }

    alert("Carrinho atualizado!");
}
</script>
{% endblock %}
