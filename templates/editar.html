<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Produto</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">
        <h2 class="text-center mb-4">✏️ Editar Produto</h2>

        <form method="POST" enctype="multipart/form-data">

            <!-- Nome -->
            <div class="mb-3">
                <label class="form-label">Nome do Produto</label>
                <input type="text" name="nome" class="form-control" value="{{ produto.nome }}">
            </div>

            <!-- Descrição -->
            <div class="mb-3">
                <label class="form-label">Descrição</label>
                <input type="text" name="descricao" class="form-control" value="{{ produto.descricao }}">
            </div>

            <!-- Preço -->
            <div class="mb-3">
                <label class="form-label">Preço</label>
                <input type="text" name="preco" class="form-control" value="{{ produto.preco }}">
            </div>

            <!-- Imagem atual -->
            <div class="mb-3 text-center">
                <label class="form-label d-block">Imagem Atual</label>
                <img src="{{ url_for('static', filename='uploads/' + produto.imagem) }}" 
                     class="img-fluid rounded shadow" 
                     style="max-width: 200px;">
            </div>

            <!-- Nova imagem -->
            <div class="mb-3">
                <label class="form-label">Trocar Imagem</label>
                <input type="file" name="imagem" class="form-control">
            </div>

            <!-- Botão -->
            <div class="text-center">
                <button type="submit" class="btn btn-success px-4">Salvar</button>
                <a href="/" class="btn btn-secondary">Cancelar</a>
            </div>

        </form>
    </div>

</div>

</body>
</html>
