<h2>Editar Produto</h2>

<form method="POST" enctype="multipart/form-data">
    
    <input name="nome" class="form-control mb-2" value="{{ produto.nome }}" required>

    <textarea name="descricao" class="form-control mb-2">
        {{ produto.descricao }}
    </textarea>

    <input name="preco" type="number" step="0.01"
           class="form-control mb-2"
           value="{{ produto.preco }}" required>

    <input type="file" name="imagem" class="form-control mb-2">

    {% if produto.imagem %}
        <img src="{{ url_for('static', filename='imagens/' + produto.imagem) }}" width="100">
    {% endif %}

    <button class="btn btn-success">Salvar</button>
</form>
